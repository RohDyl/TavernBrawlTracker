
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tavern Brawl">
<meta name="theme-color" content="#111111">
<title>Tavern Brawl Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
html{height:100%;}
body{width:100%;height:100vh;height:100dvh;overflow:hidden;background:#111;font-family:'Nunito',sans-serif;}
#root{position:fixed;top:0;left:0;right:0;height:100vh;height:100dvh;overflow:hidden;background:#111;}
  #app{position:absolute;inset:0;overflow:hidden;}
  .welcome,.setup,.game,.end{position:absolute;inset:0;}

  /* WELCOME */
  .welcome{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:32px;padding-top:max(env(safe-area-inset-top,32px),32px);padding-bottom:max(env(safe-area-inset-bottom,32px),32px);}
  .welcome-icon{font-size:70px;}
  .welcome-title{font-family:'Bangers',cursive;font-size:74px;color:#FFD700;text-shadow:4px 4px 0 #000,6px 6px 0 #FF4F8B;letter-spacing:.08em;text-align:center;line-height:.88;}
  .welcome-sub{font-family:'Bangers',cursive;font-size:14px;color:#00C8B4;letter-spacing:.2em;}

  /* SETUP */
  .setup{background:#C4820A;display:flex;flex-direction:column;overflow:hidden;}
  .setup-head{flex-shrink:0;background:#111;border-bottom:4px solid #FFD700;text-align:center;padding:9px 16px;padding-top:max(env(safe-area-inset-top,9px),9px);}
  .setup-head h1{font-family:'Bangers',cursive;font-size:25px;color:#FFD700;text-shadow:2px 2px 0 #FF4F8B;letter-spacing:.08em;line-height:1;}
  .setup-head .sub{font-family:'Bangers',cursive;font-size:11px;color:#00C8B4;letter-spacing:.2em;}
  .setup-body{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
  .setup-body > *{flex-shrink:0;}
  .setup-body::-webkit-scrollbar{width:3px;}
  .setup-body::-webkit-scrollbar-thumb{background:#888;border-radius:3px;}
  .setup-foot{flex-shrink:0;padding:10px 14px;padding-bottom:max(env(safe-area-inset-bottom,0px),34px);background:#C4820A;}
  .sbox{background:#FFF8E0;border:3px solid #111;border-radius:10px;overflow:hidden;box-shadow:3px 3px 0 #111;}
  .sbox-head{background:#111;padding:6px 10px;font-family:'Bangers',cursive;font-size:13px;letter-spacing:.1em;color:#FFD700;display:flex;align-items:center;justify-content:space-between;}
  .sbox-body{padding:9px;}
  .name-inp{width:100%;background:#fff;border:2px solid #111;border-radius:8px;padding:9px 10px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:#111;outline:none;box-shadow:2px 2px 0 #111;-webkit-user-select:text;user-select:text;}
  .name-inp:focus{border-color:#FF4F8B;}
  .bb-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .bb-opt{background:#fff;border:2px solid #111;border-radius:8px;padding:9px 4px;text-align:center;cursor:pointer;box-shadow:2px 2px 0 #111;}
  .bb-opt.sel{box-shadow:2px 2px 0 #111,0 0 0 3px #FF4F8B;background:#FFF3C4;}
  .bb-opt-name{font-family:'Bangers',cursive;font-size:13px;color:#111;line-height:1.05;}
  .bb-opt-meta{font-size:10px;font-weight:900;color:#FF4F8B;margin-top:2px;}

  /* collapsed BB chip */
  .bb-chosen{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .bb-chosen-info{display:flex;align-items:center;gap:8px;font-family:'Bangers',cursive;font-size:18px;color:#111;letter-spacing:.03em;}
  .bb-chosen-info .hearts{font-family:'Nunito';font-weight:900;font-size:13px;color:#FF4F8B;}
  .bb-change{background:#FFD700;border:2px solid #111;border-radius:7px;padding:6px 12px;font-family:'Bangers',cursive;font-size:12px;letter-spacing:.06em;color:#111;cursor:pointer;box-shadow:2px 2px 0 #111;flex-shrink:0;}
  .bb-change:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #111;}

  .budget-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .budget-lbl{font-family:'Bangers',cursive;font-size:14px;color:#111;}
  .budget-num{font-size:22px;color:#FF4F8B;}
  .budget-num.zero{color:#8BC34A;}
  .add-row{display:flex;gap:8px;margin-bottom:8px;}
  .add-btn{flex:1;background:#fff;border:2px solid #111;border-radius:9px;padding:10px 4px;font-family:'Bangers',cursive;font-size:14px;letter-spacing:.04em;color:#111;cursor:pointer;text-align:center;box-shadow:2px 2px 0 #111;}
  .add-btn.sc{background:#00C8B4;}
  .add-btn.br{background:#FF4F8B;color:#fff;}
  .add-btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}
  .squad-list{display:flex;flex-direction:column;gap:5px;}
  .squad-item{display:flex;align-items:center;gap:9px;background:#fff;border:2px solid #111;border-radius:7px;padding:6px 9px;}
  .sw-btn{width:30px;height:30px;border-radius:50%;border:2px solid #111;flex-shrink:0;cursor:pointer;box-shadow:1px 1px 0 #111;position:relative;}
  .sw-btn::after{content:'🎨';position:absolute;bottom:-5px;right:-6px;font-size:10px;}
  .squad-item-txt{flex:1;font-weight:700;font-size:14px;color:#111;}
  .squad-item-txt small{color:#aaa;font-size:11px;}
  .sq-rm{background:#FF4F8B;color:#fff;border:2px solid #111;border-radius:5px;width:28px;height:28px;font-size:15px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .full-msg{text-align:center;font-family:'Bangers',cursive;font-size:13px;color:#8BC34A;letter-spacing:.06em;margin-bottom:8px;}
  .hint{font-size:11px;font-weight:700;color:#9a6a10;text-align:center;margin-top:6px;}
  .pdots{display:flex;justify-content:center;gap:8px;margin-bottom:4px;}
  .pdot{width:10px;height:10px;border-radius:50%;border:2px solid #111;background:#fff;}
  .pdot.act{background:#FF4F8B;}.pdot.done{background:#8BC34A;}

  /* GAME */
  .game{display:flex;flex-direction:column;background:#C4820A;padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px);}
  .pzone{flex:1;min-height:0;display:flex;flex-direction:column;background:#FFF8E0;overflow:hidden;}
  .pzone.p1{transform:rotate(180deg);}
  .phead{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:3px solid #111;flex-shrink:0;gap:8px;background:#111;}
  .pname{font-family:'Bangers',cursive;font-size:18px;letter-spacing:.04em;color:#FFD700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .cmd-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
  .cmd-toks{display:flex;gap:4px;}
  .cmd-tok{width:36px;height:36px;border-radius:50%;background:#9B50E0;border:2.5px solid #c89bf0;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:transform .1s;line-height:1;}
  .cmd-tok:active{transform:scale(.86);}
  .cmd-tok.used{background:#444;border-color:#666;color:#888;}
  .cmd-tok.dead{opacity:.2;pointer-events:none;}
  .cmd-lbl{font-family:'Bangers',cursive;font-size:8px;color:#c89bf0;letter-spacing:.08em;line-height:1;}

  .score-area{display:flex;align-items:center;gap:5px;flex-shrink:0;}
  .sbtn{width:30px;height:30px;background:#333;border:1.5px solid #555;border-radius:6px;font-family:'Bangers',cursive;font-size:19px;color:#FFD700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .snum{font-family:'Bangers',cursive;font-size:30px;color:#FFD700;min-width:34px;text-align:center;line-height:1;}
  .slbl{font-family:'Bangers',cursive;font-size:8px;color:#888;letter-spacing:.1em;}

  .models-wrap{flex:1;min-height:0;overflow:hidden;padding:6px 7px;display:flex;flex-direction:column;gap:6px;}
  .m{flex:1 1 0;min-height:0;display:flex;align-items:stretch;background:#fff;border:2px solid #111;border-radius:10px;overflow:hidden;box-shadow:2px 2px 0 #111;}
  .m.ko{opacity:.42;background:#e6e6e6;}
  .m-stripe{width:10px;flex-shrink:0;}
  .m-mid{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;padding:2px 9px;gap:2px;}
  .m-name{font-family:'Bangers',cursive;font-size:16px;color:#111;letter-spacing:.03em;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .m-tags{display:flex;gap:4px;align-items:center;}
  .m-tag{font-family:'Bangers',cursive;font-size:9px;padding:1px 6px;border-radius:4px;border:1.5px solid #111;letter-spacing:.04em;}
  .t-bld{background:#FF4F8B;color:#fff;}
  .t-ko{background:#111;color:#FFD700;}
  .t-type{background:#eee;color:#555;}

  .ord-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 9px;border-left:2px dashed #e0d8c0;flex-shrink:0;}
  .ord{width:44px;height:44px;border-radius:50%;border:3px solid #111;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;box-shadow:2px 2px 0 #111;transition:transform .1s;line-height:1;flex-shrink:0;aspect-ratio:1/1;}
  .ord:active{transform:scale(.86);}
  .ord.used{background:#d0d0d0 !important;border-color:#aaa !important;box-shadow:1px 1px 0 #aaa !important;color:#888;}
  .ord-lbl{font-family:'Bangers',cursive;font-size:8px;color:#999;letter-spacing:.06em;margin-top:2px;}

  .blood{display:flex;align-items:center;gap:7px;padding:0 9px;border-left:2px dashed #e0d8c0;flex-shrink:0;}
  .bbtn{width:46px;height:46px;border-radius:10px;border:2px solid #111;font-family:'Bangers',cursive;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:2px 2px 0 #111;transition:transform .1s;aspect-ratio:1/1;}
  .bbtn:active{transform:scale(.9);}
  .bbtn.minus{background:#FF4F8B;color:#fff;}
  .bbtn.plus{background:#8BC34A;color:#111;}
  .bbtn:disabled{opacity:.25;cursor:not-allowed;box-shadow:none;}
  .bnum{font-family:'Bangers',cursive;font-size:32px;color:#111;line-height:1;min-width:56px;text-align:center;}
  .bnum.bl{color:#FF4F8B;}.bnum.ko{color:#aaa;}
  .bnum sub{font-size:14px;color:#bbb;}

  /* Scale controls down as the squad grows so nothing distorts */
  .models-wrap.count4 .ord{width:38px;height:38px;font-size:17px;border-width:2.5px;}
  .models-wrap.count5 .ord{width:34px;height:34px;font-size:15px;border-width:2.5px;}
  .models-wrap.count4 .bbtn{width:40px;height:40px;font-size:24px;}
  .models-wrap.count5 .bbtn{width:36px;height:36px;font-size:22px;}
  .models-wrap.count4 .bnum{font-size:28px;min-width:48px;}
  .models-wrap.count5 .bnum{font-size:25px;min-width:44px;}
  .models-wrap.count4 .m-name,.models-wrap.count5 .m-name{font-size:14px;}
  .models-wrap.count5 .ord-lbl{display:none;}
  .models-wrap.count4 .blood,.models-wrap.count5 .blood{gap:5px;padding:0 7px;}
  .models-wrap.count4 .ord-wrap,.models-wrap.count5 .ord-wrap{padding:0 7px;}

  /* CENTER STRIP */
  .cstrip{height:54px;background:#111;border-top:3px solid #FFD700;border-bottom:3px solid #FFD700;display:flex;align-items:center;justify-content:space-between;padding:0 10px;flex-shrink:0;z-index:10;gap:6px;}
  .turn-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
  .turn-lbl{font-family:'Bangers',cursive;font-size:8px;color:#888;letter-spacing:.1em;}
  .turn-num{font-family:'Bangers',cursive;font-size:24px;color:#FFD700;text-shadow:1px 1px 0 #FF4F8B;line-height:1;}

  .init-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
  .init-coin{width:42px;height:42px;border-radius:50%;background:#FFD700;border:3px solid #b8900a;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 0 2px #111;transition:transform .12s;}
  .init-coin:active{transform:scale(.88);}
  .init-arrow{font-family:'Bangers',cursive;font-size:24px;color:#111;line-height:1;}
  .init-lbl{font-family:'Bangers',cursive;font-size:8px;color:#FFD700;letter-spacing:.08em;margin-top:1px;}

  .prize-row{display:flex;align-items:center;gap:4px;flex-shrink:0;}
  .ptok{width:26px;height:26px;background:#FFD700;border:2px solid #888;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .ptok.claimed{background:#333;opacity:.25;}
  .etbtn{background:#FF4F8B;border:2px solid #FFD700;border-radius:8px;padding:8px 11px;font-family:'Bangers',cursive;font-size:14px;letter-spacing:.05em;color:#fff;cursor:pointer;box-shadow:2px 2px 0 rgba(255,215,0,.4);transition:transform .1s;flex-shrink:0;}
  .etbtn:active{transform:scale(.95);}
  .etbtn.last{background:#9B50E0;}

  /* MODAL */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:center;justify-content:center;padding:20px;padding-bottom:max(env(safe-area-inset-bottom,20px),20px);}
  .modal-box{background:#FFF8E0;border:3px solid #111;border-radius:12px;padding:18px;box-shadow:6px 6px 0 #111;width:100%;max-width:380px;max-height:90%;overflow-y:auto;}
  .modal-title{font-family:'Bangers',cursive;font-size:20px;color:#111;margin-bottom:6px;text-align:center;letter-spacing:.05em;}
  .modal-note{text-align:center;font-size:11px;font-weight:700;color:#888;margin-bottom:14px;}
  .pz-claim{border:2px solid #111;border-radius:9px;padding:9px;margin-bottom:9px;background:#fff;box-shadow:2px 2px 0 #111;}
  .pz-claim-lbl{font-family:'Bangers',cursive;font-size:14px;color:#111;text-align:center;margin-bottom:7px;}
  .pz-opts{display:flex;gap:6px;}
  .pz-opt{flex:1;border:2px solid #111;border-radius:8px;padding:10px 3px;font-family:'Bangers',cursive;font-size:13px;text-align:center;cursor:pointer;background:#fff;color:#111;line-height:1.1;}
  .pz-opt.sel{box-shadow:0 0 0 3px #FF4F8B inset;}
  .pz-opt.p0{background:#FFD700;}.pz-opt.p1c{background:#00C8B4;}.pz-opt.none{background:#e0e0e0;color:#888;}

  /* END */
  .end{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:28px;padding-top:max(env(safe-area-inset-top,28px),28px);padding-bottom:max(env(safe-area-inset-bottom,34px),34px);}
  .end-title{font-family:'Bangers',cursive;font-size:44px;color:#FFD700;text-shadow:3px 3px 0 #FF4F8B;letter-spacing:.06em;text-align:center;line-height:1;}
  .end-winner{background:#FF4F8B;border:3px solid #FFD700;border-radius:12px;padding:12px 20px;text-align:center;box-shadow:4px 4px 0 #FFD700;width:100%;}
  .ew-sub{font-family:'Bangers',cursive;font-size:11px;color:#ffb0c8;letter-spacing:.2em;}
  .ew-name{font-family:'Bangers',cursive;font-size:28px;color:#fff;letter-spacing:.05em;}
  .ew-pts{font-family:'Bangers',cursive;font-size:18px;color:#FFD700;}
  .end-scores{display:flex;gap:10px;width:100%;}
  .esc{flex:1;background:#FFF8E0;border:3px solid #FFD700;border-radius:10px;padding:10px;text-align:center;box-shadow:3px 3px 0 #FFD700;}
  .esc-name{font-family:'Bangers',cursive;font-size:13px;color:#111;}
  .esc-pts{font-family:'Bangers',cursive;font-size:36px;color:#FF4F8B;text-shadow:2px 2px 0 #000;line-height:1;}

  /* SHARED */
  .btn-main{width:100%;background:#FFD700;border:3px solid #111;border-radius:10px;padding:13px;font-family:'Bangers',cursive;font-size:21px;letter-spacing:.1em;color:#111;cursor:pointer;box-shadow:4px 4px 0 #111;text-align:center;transition:transform .1s;}
  .btn-main:active{transform:scale(.97);}
  .btn-main:disabled{opacity:.35;cursor:not-allowed;}

  /* TOAST */
  .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;color:#FFD700;font-family:'Bangers',cursive;font-size:16px;letter-spacing:.06em;padding:11px 22px;border-radius:8px;border:3px solid #FFD700;z-index:1000;animation:tst 1.8s forwards;text-align:center;pointer-events:none;max-width:280px;}
  @keyframes tst{0%{opacity:0;transform:translate(-50%,-50%) scale(.85);}15%{opacity:1;transform:translate(-50%,-50%) scale(1);}70%{opacity:1;}100%{opacity:0;}}
</style>
</head>
<body>
<div id="root">
  <div id="app"></div>
  <div id="toast-c"></div>
  <div class="modal-bg" id="prize-modal">
    <div class="modal-box">
      <div class="modal-title" id="pz-title">🏆 CLAIM PRIZES</div>
      <div class="modal-note">Any unengaged model within 1" of a prize claims it (+3 pts).</div>
      <div id="pz-rows"></div>
      <button class="btn-main" id="pz-confirm" style="margin-top:6px;">CONFIRM &amp; CONTINUE</button>
    </div>
  </div>
</div>

<script>
  const COLORS=[{bg:'#FFD700'},{bg:'#00C8B4'},{bg:'#FF4F8B'},{bg:'#8BC34A'},{bg:'#3B82F6'},{bg:'#F97316'},{bg:'#A855F7'},{bg:'#34D399'},{bg:'#FB923C'},{bg:'#EF4444'}];
  const BB=[
    {name:'Big Sal',grit:9},{name:'Mad Maggie',grit:7},{name:'Brickhouse Barry',grit:8},
    {name:'Barmaid Bessie',grit:5},{name:'Lucky Lenny',grit:4},{name:'One-Eyed McGee',grit:5},
    {name:'The Colonel',grit:6},{name:'Mother Malone',grit:7},{name:'Tiny',grit:5},{name:'Slick Vince',grit:5}
  ];
  let mid=0; const nm=()=>++mid;
  let gColor=0;
  function mkPlayer(n){return {name:n,score:0,bbIdx:null,budget:4,models:[],cmdMax:1,cmdUsed:0};}
  function mkModel(type,name,max,num){const ci=gColor%COLORS.length;gColor++;return {id:nm(),type,name,max,cur:max,ci,ko:false,activated:false,num:num||0,bbBld:false};}
  function dispName(models,m){if(m.type==='bb')return m.name;const l=m.type==='scrapper'?'Scrapper':'Brute';return models.filter(x=>x.type===m.type).length>1?l+' '+m.num:l;}
  function isBloodied(m){if(m.ko)return false;if(m.type==='bb')return m.bbBld;return m.cur<=Math.floor(m.max/2);}

  let S={screen:'welcome',sp:0,players:[mkPlayer('Player 1'),mkPlayer('Player 2')],turn:1,prizes:[true,true,true],init:0,winner:null,tmpClaims:{},editBB:false};

  function selBB(pi,bi){const p=S.players[pi];p.models=p.models.filter(m=>m.type!=='bb');p.bbIdx=bi;const b=BB[bi];p.cmdMax=(b.name==='The Colonel')?2:1;p.models.unshift(mkModel('bb',b.name,b.grit,0));S.editBB=false;render();}
  function editBB(){S.editBB=true;render();}
  function addMdl(pi,type){const p=S.players[pi],c=type==='scrapper'?1:2;if(p.budget<c)return;p.budget-=c;const num=p.models.filter(m=>m.type===type).length+1;p.models.push(mkModel(type,type==='scrapper'?'Scrapper':'Brute',type==='scrapper'?4:7,num));render();}
  function rmMdl(pi,id){const p=S.players[pi],m=p.models.find(x=>x.id===id);if(!m)return;if(m.type==='bb'){p.bbIdx=null;p.cmdMax=1;S.editBB=true;}else p.budget+=m.type==='scrapper'?1:2;p.models=p.models.filter(x=>x.id!==id);if(m.type!=='bb'){let n=1;p.models.filter(x=>x.type===m.type).forEach(x=>{x.num=n++;});}render();}
  function cycColor(pi,id){const m=S.players[pi].models.find(x=>x.id===id);if(m){m.ci=(m.ci+1)%COLORS.length;render();}}
  function toggleOrd(pi,id){const m=S.players[pi].models.find(x=>x.id===id);if(m&&!m.ko){m.activated=!m.activated;render();}}
  function tapCmd(pi){const p=S.players[pi],bb=p.models.find(m=>m.type==='bb');if(!bb||bb.ko)return;p.cmdUsed=(p.cmdUsed+1)>p.cmdMax?0:p.cmdUsed+1;render();}
  function flipInit(){S.init=S.init===0?1:0;render();}
  function chBlood(pi,id,d){
    const p=S.players[pi],m=p.models.find(x=>x.id===id);if(!m)return;
    if(m.ko&&d>0){
      const op=pi===0?1:0,pts=m.type==='bb'?3:m.type==='brute'?2:1;
      S.players[op].score=Math.max(0,S.players[op].score-pts);
      m.ko=false;m.cur=1;
      if(m.type==='bb'&&m.cur<=Math.ceil(m.max/2))m.bbBld=true;
      render();return;
    }
    if(m.ko)return;
    const nv=Math.max(0,Math.min(m.max,m.cur+d));m.cur=nv;
    if(m.type==='bb'&&nv>0&&nv<=Math.ceil(m.max/2))m.bbBld=true;
    if(nv===0){
      m.ko=true;
      const op=pi===0?1:0,pts=m.type==='bb'?3:m.type==='brute'?2:1;
      S.players[op].score+=pts;
      const lbl=m.type==='bb'?m.name:(m.type==='scrapper'?'Scrapper':'Brute');
      showToast('💀 '+lbl+" KO'd — "+S.players[op].name+' +'+pts);
      if(p.models.every(x=>x.ko)){S.screen='end';setWinner();render();return;}
    }
    render();
  }
  function adjScore(pi,d){S.players[pi].score=Math.max(0,S.players[pi].score+d);render();}

  function endTurn(){if(S.prizes.some(av=>av)){openPrizeModal();return;}proceedTurn();}
  function proceedTurn(){
    if(S.turn>=4){S.screen='end';setWinner();render();return;}
    S.turn++;
    S.players.forEach(p=>{p.cmdUsed=0;p.models.forEach(m=>{m.activated=false;});});
    showToast('⚡ TURN '+S.turn+' — ORDERS RESET');
    render();
  }
  function setWinner(){
    const s0=S.players[0].score,s1=S.players[1].score;
    if(s0>s1){S.winner=0;return;}if(s1>s0){S.winner=1;return;}
    const b0=S.players[0].models.find(m=>m.type==='bb'),b1=S.players[1].models.find(m=>m.type==='bb');
    const a0=b0&&!b0.ko,a1=b1&&!b1.ko;
    if(a0&&!a1)S.winner=0;else if(a1&&!a0)S.winner=1;
    else if(a0&&a1){if(b0.cur>b1.cur)S.winner=0;else if(b1.cur>b0.cur)S.winner=1;else S.winner='draw';}
    else S.winner='draw';
  }
  function nextSetup(){if(S.sp===0){S.sp=1;S.editBB=false;render();}else{S.screen='game';render();}}
  function reset(){mid=0;gColor=0;S={screen:'welcome',sp:0,players:[mkPlayer('Player 1'),mkPlayer('Player 2')],turn:1,prizes:[true,true,true],init:0,winner:null,tmpClaims:{},editBB:false};render();}

  function openPrizeModal(){S.tmpClaims={};document.getElementById('pz-title').textContent='🏆 END OF TURN '+S.turn+' — PRIZES';renderPrizeRows();document.getElementById('prize-modal').style.display='flex';}
  function renderPrizeRows(){
    const c=document.getElementById('pz-rows');c.innerHTML='';
    S.prizes.forEach((av,i)=>{
      if(!av)return;const sel=S.tmpClaims[i];
      const row=document.createElement('div');row.className='pz-claim';
      row.innerHTML='<div class="pz-claim-lbl">🏆 Prize '+(i+1)+'</div><div class="pz-opts">'+
        '<div class="pz-opt p0'+(sel===0?' sel':'')+'" data-pz="'+i+'" data-who="0">'+S.players[0].name+'</div>'+
        '<div class="pz-opt p1c'+(sel===1?' sel':'')+'" data-pz="'+i+'" data-who="1">'+S.players[1].name+'</div>'+
        '<div class="pz-opt none'+(sel===undefined||sel==='n'?' sel':'')+'" data-pz="'+i+'" data-who="n">No one</div></div>';
      c.appendChild(row);
    });
  }
  function confirmPrizes(){Object.keys(S.tmpClaims).forEach(i=>{const w=S.tmpClaims[i];if(w===0||w===1){S.prizes[i]=false;S.players[w].score+=3;}});document.getElementById('prize-modal').style.display='none';proceedTurn();}
  function showToast(msg){const c=document.getElementById('toast-c'),t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),1900);}

  function render(){const a=document.getElementById('app');if(S.screen==='welcome')a.innerHTML=rWelcome();else if(S.screen==='setup')a.innerHTML=rSetup();else if(S.screen==='game')a.innerHTML=rGame();else if(S.screen==='end')a.innerHTML=rEnd();attach();}
  function rWelcome(){return `<div class="welcome"><div class="welcome-icon">🍺</div><div class="welcome-title">TAVERN<br>BRAWL</div><div class="welcome-sub">BLOOD · ORDERS · SCORE</div><button class="btn-main" id="btn-go-setup">START GAME</button></div>`;}

  function rSetup(){
    const pi=S.sp,p=S.players[pi],valid=p.bbIdx!==null,last=pi===1;
    const showGrid=(p.bbIdx===null||S.editBB);

    let bbSection;
    if(showGrid){
      const bbOpts=BB.map((b,i)=>`<div class="bb-opt${p.bbIdx===i?' sel':''}" data-a="selbb" data-pi="${pi}" data-bi="${i}"><div class="bb-opt-name">${b.name}</div><div class="bb-opt-meta">❤️ ${b.grit}${b.name==='The Colonel'?' · ⭐⭐':''}</div></div>`).join('');
      bbSection=`<div class="sbox"><div class="sbox-head">⭐ CHOOSE YOUR BIG BOZZA</div><div class="sbox-body"><div class="bb-grid">${bbOpts}</div></div></div>`;
    }else{
      const b=BB[p.bbIdx];
      bbSection=`<div class="sbox"><div class="sbox-head">⭐ YOUR BIG BOZZA</div><div class="sbox-body"><div class="bb-chosen"><div class="bb-chosen-info">👑 ${b.name} <span class="hearts">❤️${b.grit}${b.name==='The Colonel'?' ⭐⭐':''}</span></div><button class="bb-change" data-a="editbb">CHANGE</button></div></div></div>`;
    }

    const sq=p.models.map(m=>{const col=COLORS[m.ci];const dn=dispName(p.models,m);return `<div class="squad-item"><div class="sw-btn" style="background:${col.bg}" data-a="cyc" data-pi="${pi}" data-id="${m.id}"></div><span class="squad-item-txt">${dn} <small>❤️${m.max}${m.type==='bb'?' · Free':m.type==='scrapper'?' · 1pt':' · 2pt'}</small></span><button class="sq-rm" data-a="rm" data-pi="${pi}" data-id="${m.id}">✕</button></div>`;}).join('');
    const addControls = p.budget>0
      ? `<div class="budget-row"><span class="budget-lbl">Points left: <span class="budget-num">${p.budget}</span></span></div><div class="add-row"><button class="add-btn sc" data-a="addsc" data-pi="${pi}" ${p.budget<1?'disabled':''}>+ SCRAPPER<br><small style="font-family:Nunito;font-size:10px">1pt · ❤️4</small></button><button class="add-btn br" data-a="addbr" data-pi="${pi}" ${p.budget<2?'disabled':''}>+ BRUTE<br><small style="font-family:Nunito;font-size:10px">2pt · ❤️7</small></button></div>`
      : `<div class="full-msg">✅ ALL 4 POINTS SPENT</div>`;
    const crewList = sq?`<div class="squad-list">${sq}</div><div class="hint">🎨 Tap a colour dot to change a unit's colour</div>`:`<div style="text-align:center;color:#bbb;font-size:11px;font-weight:700;padding:4px 0">Add your crew below</div>`;
    const crewSection=`<div class="sbox"><div class="sbox-head">👥 ADD CREW — 4 POINTS</div><div class="sbox-body">${addControls}${crewList}</div></div>`;

    return `<div class="setup"><div class="setup-head"><h1>TAVERN BRAWL</h1><div class="sub">BUILD YOUR SQUAD</div></div><div class="setup-body"><div class="pdots"><div class="pdot${S.sp>0?' done':' act'}"></div><div class="pdot${S.sp===1?' act':''}"></div></div><div class="sbox"><div class="sbox-head">👤 PLAYER ${pi+1} NAME</div><div class="sbox-body"><input class="name-inp" type="text" value="${p.name}" placeholder="Enter name..." data-a="setname" data-pi="${pi}" maxlength="14"></div></div>${bbSection}${crewSection}</div><div class="setup-foot"><button class="btn-main" id="btn-nxt" ${!valid?'disabled':''}>${last?'🍺 START BRAWL!':'NEXT PLAYER →'}</button></div></div>`;
  }

  function rModel(m,pi,all){
    const col=COLORS[m.ci];const bl=isBloodied(m);const dn=dispName(all,m);
    const tl=m.type==='bb'?'BB':m.type==='scrapper'?'SCRAP':'BRUTE';
    const ordUsed=m.activated||m.ko;
    const ordStyle=ordUsed?'':`background:${col.bg};border-color:#111;`;
    const bnumCls=(bl?' bl':'')+(m.ko?' ko':'');
    return `<div class="m${m.ko?' ko':''}">
      <div class="m-stripe" style="background:${col.bg}"></div>
      <div class="m-mid"><div class="m-name">${dn}</div><div class="m-tags"><span class="m-tag t-type">${tl}</span>${bl?'<span class="m-tag t-bld">🩸 BLD</span>':''}${m.ko?'<span class="m-tag t-ko">💀 KO</span>':''}</div></div>
      <div class="ord-wrap"><div class="ord${ordUsed?' used':''}" style="${ordStyle}" data-a="ord" data-pi="${pi}" data-id="${m.id}">${ordUsed?'✕':'★'}</div><span class="ord-lbl">ORD</span></div>
      <div class="blood"><button class="bbtn minus" data-a="bm" data-pi="${pi}" data-id="${m.id}" ${m.ko?'disabled':''}>−</button><div class="bnum${bnumCls}">${m.ko?'💀':m.cur}<sub>/${m.max}</sub></div><button class="bbtn plus" data-a="bp" data-pi="${pi}" data-id="${m.id}" ${(!m.ko&&m.cur>=m.max)?'disabled':''}>+</button></div>
    </div>`;
  }
  function rPanel(pi,flip){
    const p=S.players[pi];const bb=p.models.find(m=>m.type==='bb'),bbAlive=bb&&!bb.ko;
    const mds=p.models.map(m=>rModel(m,pi,p.models)).join('');
    const mw='models-wrap count'+p.models.length;
    let cmdHTML='';
    for(let i=0;i<p.cmdMax;i++){const used=i<p.cmdUsed;const cls=!bbAlive?'dead':(used?'used':'');cmdHTML+=`<div class="cmd-tok ${cls}">${!bbAlive?'✕':(used?'✕':'⭐')}</div>`;}
    return `<div class="pzone${flip?' p1':''}"><div class="phead"><span class="pname">${p.name}</span><div class="cmd-wrap"><div class="cmd-toks" data-a="cmd" data-pi="${pi}">${cmdHTML}</div><span class="cmd-lbl">CMD</span></div><div class="score-area"><button class="sbtn" data-a="sm" data-pi="${pi}">−</button><div style="display:flex;flex-direction:column;align-items:center;"><div class="snum">${p.score}</div><div class="slbl">PTS</div></div><button class="sbtn" data-a="sp" data-pi="${pi}">+</button></div></div><div class="${mw}">${mds||'<div style="text-align:center;color:#ccc;font-weight:700;padding:16px">No models</div>'}</div></div>`;
  }
  function rGame(){
    const prz=S.prizes.map(av=>`<div class="ptok${av?'':' claimed'}">🏆</div>`).join('');
    const last=S.turn>=4;
    const arrow=S.init===0?'▲':'▼';
    return `<div class="game">${rPanel(0,true)}<div class="cstrip"><div class="turn-col"><div class="turn-lbl">TURN</div><div class="turn-num">${S.turn}<span style="font-size:11px;color:#555">/4</span></div></div><div class="init-col"><div class="init-coin" data-a="init"><span class="init-arrow">${arrow}</span></div><span class="init-lbl">INIT</span></div><div class="prize-row">${prz}</div><button class="etbtn${last?' last':''}" data-a="et">${last?'END':'END TURN'}</button></div>${rPanel(1,false)}</div>`;
  }
  function rEnd(){
    const p0=S.players[0],p1=S.players[1];
    const w=S.winner==='draw'?`<div class="end-winner" style="background:#9B50E0;border-color:#6a2aaa;box-shadow:4px 4px 0 #6a2aaa;"><div class="ew-sub">RESULT</div><div class="ew-name">🤝 IT'S A DRAW!</div></div>`:`<div class="end-winner"><div class="ew-sub">WINNER</div><div class="ew-name">${S.players[S.winner].name}</div><div class="ew-pts">${S.players[S.winner].score} pts 🏆</div></div>`;
    return `<div class="end"><div style="font-size:48px">🍺</div><div class="end-title">LAST ONE<br>STANDING!</div>${w}<div class="end-scores"><div class="esc"><div class="esc-name">${p0.name}</div><div class="esc-pts">${p0.score}</div></div><div class="esc"><div class="esc-name">${p1.name}</div><div class="esc-pts">${p1.score}</div></div></div><button class="btn-main" id="btn-reset">🍺 PLAY AGAIN</button></div>`;
  }

  function attach(){
    const app=document.getElementById('app');
    app.addEventListener('click',onClick);
    app.addEventListener('input',onInput);
    document.getElementById('pz-rows').addEventListener('click',onPzClick);
    document.getElementById('pz-confirm').onclick=confirmPrizes;
  }
  function onPzClick(e){const el=e.target.closest('[data-pz]');if(!el)return;const i=parseInt(el.dataset.pz),who=el.dataset.who;S.tmpClaims[i]=(who==='n'?'n':parseInt(who));renderPrizeRows();}
  function onClick(e){
    const sid=e.target.closest('[id]')?.id;
    if(sid==='btn-go-setup'){S.screen='setup';render();return;}
    if(sid==='btn-nxt'){nextSetup();return;}
    if(sid==='btn-reset'){reset();return;}
    const el=e.target.closest('[data-a]');if(!el)return;
    const a=el.dataset.a,pi=parseInt(el.dataset.pi),id=parseInt(el.dataset.id),bi=parseInt(el.dataset.bi);
    switch(a){
      case 'selbb':selBB(pi,bi);break;
      case 'editbb':editBB();break;
      case 'addsc':addMdl(pi,'scrapper');break;
      case 'addbr':addMdl(pi,'brute');break;
      case 'rm':rmMdl(pi,id);break;
      case 'cyc':cycColor(pi,id);break;
      case 'ord':toggleOrd(pi,id);break;
      case 'cmd':tapCmd(pi);break;
      case 'init':flipInit();break;
      case 'bm':chBlood(pi,id,-1);break;
      case 'bp':chBlood(pi,id,1);break;
      case 'sm':adjScore(pi,-1);break;
      case 'sp':adjScore(pi,1);break;
      case 'et':endTurn();break;
    }
  }
  function onInput(e){if(e.target.dataset.a==='setname')S.players[parseInt(e.target.dataset.pi)].name=e.target.value||'Player '+(parseInt(e.target.dataset.pi)+1);}

  render();
</script>

</body></html>
